# render.yaml — Render Blueprint for one-click deployment
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: vidhilikhit-ai-pro
    runtime: node
    region: singapore  # Closest to India
    plan: free         # Change to 'starter' for production
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: WHATSAPP_TOKEN
        sync: false  # Set manually in Render dashboard
      - key: PHONE_NUMBER_ID
        sync: false
      - key: VERIFY_TOKEN
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: ADMIN_PHONE_NUMBER
        sync: false
      - key: ADMIN_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: vidhilikhit-db
          property: connectionString

databases:
  - name: vidhilikhit-db
    plan: free  # 1GB free PostgreSQL
    region: singapore
